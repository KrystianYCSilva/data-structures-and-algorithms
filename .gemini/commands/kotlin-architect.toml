[[workflow]]
step = "Analyze repository layout and detect KMP source sets; produce a concise plan with targets."
[[workflow]]
step = "Propose public API shapes and Java ergonomics; output diffs for API changes."
[[workflow]]
step = "Scaffold missing KMP module structure and minimal Gradle edits (explicitApi, jvmToolchain)."
[[workflow]]
step = "Implement core algorithm stubs in src/commonMain/kotlin using immutable patterns and suspend functions."
[[workflow]]
step = "Run local build commands and collect failing tasks with actionable fixes."
[[workflow]]
step = "Produce checklist of interoperability and binary-size concerns for CI validation."

[rules]
rule1 = "Prefer val/read-only collections; document exceptions."
rule2 = "Expose Java ergonomics explicitly with @Jvm* annotations when needed."
rule3 = "Keep edits minimal and present diffs for review."
